*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#1A2B4A;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:#F7F5F0;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

.hdr{background:#1A2B4A;padding:12px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#7A8396;font-size:13px;text-align:center}

@keyframes spin{to{transform:rotate(360deg)}}

<script>
/* ══ CONFIG ══════════════════════════════════════════════════════════════ */
var SK = 'jw_dbx_v1';
var DBX_PATH_ETUDES = '/etude-biblique-jw/etudes.json';
var GROQ_MODELS = ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'gemma2-9b-it'];

/* ══ UTIL RÉSEAU ═════════════════════════════════════════════════════════ */
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function(resolve, reject) {
      setTimeout(function() { reject(new Error('Délai dépassé')); }, ms);
    })
  ]);
}

/* ══ DROPBOX API ═════════════════════════════════════════════════════════ */
async function dbxUpload(token, path, content) {
  var body = typeof content === 'string' ? content : JSON.stringify(content);
  var r = await withTimeout(fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Dropbox-API-Arg': JSON.stringify({
        path: path,
        mode: {'.tag': 'overwrite'},
        autorename: false,
        mute: false,
        strict_conflict: false
      }),
      'Content-Type': 'application/octet-stream',
    },
    body: body,
  }), 15000);
  if (!r.ok) {
    var txt = await r.text().catch(function() { return ''; });
    var msg = 'HTTP ' + r.status;
    try { var e = JSON.parse(txt); msg = (e && e.error_summary) || (e && e.error && e.error.reason && e.error.reason['.tag']) || msg; } catch(e2) {}
    throw new Error(msg);
  }
  return r.json();
}

async function dbxDownload(token, path) {
  var r = await withTimeout(fetch('https://content.dropboxapi.com/2/files/download', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Dropbox-API-Arg': JSON.stringify({path: path}),
    },
  }), 15000);
  if (r.status === 409) return null; // fichier inexistant
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function dbxWho(token) {
  var r = await withTimeout(fetch('https://api.dropboxapi.com/2/users/get_current_account', {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
    body: 'null',
  }), 15000);
  if (!r.ok) throw new Error('Token invalide');
  return r.json();
}

/* ══ DONNÉES ════════════════════════════════════════════════════════════ */
var CATS = [
  {id:'all',label:'Tout',icon:'◉'},{id:'foi',label:'Foi & Confiance',icon:'🌿'},
  {id:'famille',label:'Famille',icon:'👪'},{id:'royaume',label:'Royaume de Dieu',icon:'🌍'},
  {id:'moral',label:'Valeurs morales',icon:'⚖️'},{id:'etude',label:'Étude & Sagesse',icon:'📖'},
  {id:'histoire',label:'Histoire sacrée',icon:'📜'},{id:'espoir',label:'Espoir & Avenir',icon:'🌅'},
];
var SUGGS = [
  {id:1,titre:"Quel est le nom de Dieu et pourquoi est-il important ?",cat:"foi",v:"Psaume 83:18"},
  {id:2,titre:"Qu'est-ce que le Royaume de Dieu va accomplir ?",cat:"royaume",v:"Daniel 2:44"},

  {id:15,titre:"Abraham, un exemple de foi et d'obéissance",cat:"histoire",v:"Hébreux 11:8"},
  {id:16,titre:"Comment communiquer avec Dieu ?",cat:"etude",v:"Matthieu 6:9"},
];

/* ══ ÉTAT ════════════════════════════════════════════════════════════════ */
var G = {
  history:[], catH:'all', catHist:'all',
  jwNotes:[], jwTags:[], jwFilter:'all',
  cur:null,
  dbxToken:'', dbxUser:null, lastSync:'', lastJWL:'',
  groqKey:'',
  syncing: false,
};

function load() {
  try {
    var h=localStorage.getItem(SK);    if(h) G.history=JSON.parse(h);
    var n=localStorage.getItem(SK+'n');if(n){G.jwNotes=JSON.parse(n);buildJWTags();}
    var t=localStorage.getItem(SK+'t');if(t) G.dbxToken=t;
    var u=localStorage.getItem(SK+'u');if(u) G.dbxUser=JSON.parse(u);
    var s=localStorage.getItem(SK+'s');if(s) G.lastSync=s;
    var j=localStorage.getItem(SK+'j');if(j) G.lastJWL=j;
    var gk=localStorage.getItem(SK+'gk');if(gk) G.groqKey=gk;
  } catch(e) {}
}
function saveH(){try{localStorage.setItem(SK,JSON.stringify(G.history));}catch(e){}}
function saveN(){try{localStorage.setItem(SK+'n',JSON.stringify(G.jwNotes));}catch(e){}}
function buildJWTags(){var s=new Set();G.jwNotes.forEach(function(n){(n.tags||[]).forEach(function(t){s.add(t);});});G.jwTags=[...s].sort();}

/* ══ SYNC AUTOMATIQUE DROPBOX ════════════════════════════════════════════ */
async function autoSync(silent) {
  if (silent === undefined) silent = true;
  if (!G.dbxToken || G.syncing) return;
  G.syncing = true;
  try {
    // 1. Télécharger depuis Dropbox (si fichier existe)
    var remote = null;
    try { remote = await dbxDownload(G.dbxToken, DBX_PATH_ETUDES); } catch(e) {}
    if (remote && remote.etudes && remote.etudes.length) {
      var map = new Map();
      [...G.history, ...remote.etudes].forEach(function(e) {
        var ex = map.get(e.id);
        if (!ex || (e.resume && !ex.resume)) map.set(e.id, e);
      });
      G.history = [...map.values()].sort(function(a,b) { return b.id - a.id; });
      saveH();
    }
    // 2. Uploader — contenu texte simple
    await dbxUpload(G.dbxToken, DBX_PATH_ETUDES, {v:1, ts:new Date().toISOString(), etudes:G.history});
    var t = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    G.lastSync = t; localStorage.setItem(SK+'s', t);
    updateUI();
    if (!silent) toast('✓ Synchronisé avec Dropbox — ' + t);
  } catch(e) {
    if (!silent) toast('Erreur : ' + e.message, 6000);
    else console.warn('Dropbox sync:', e.message);
  }
  G.syncing = false;
}

/* ══ NAV ═════════════════════════════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(id==='s-history') renderHist();
  if(id==='s-sync')    renderSync();
  if(id==='s-home')    renderHome();
  if(id==='s-jwnotes') renderJWNotes();
  updateUI();
}

function updateUI() {
  var n=G.history.length, m=G.jwNotes.length;
  ['b1','b3','b5'].forEach(function(id){var e=document.getElementById(id);if(e){e.textContent=n>9?'9+':String(n);e.style.display=n>0?'block':'none';}});
  ['b2','b4','b6'].forEach(function(id){var e=document.getElementById(id);if(e){e.textContent=m>9?'9+':String(m);e.style.display=m>0?'block':'none';}});
  var si=document.getElementById('sync-icon');
  var sl=document.getElementById('sync-lbl');
  if(si) si.textContent = G.dbxUser ? '📦' : '⬜';
  if(sl) {
    sl.textContent = G.dbxUser ? (G.lastSync||'Dropbox') : 'sync';
    sl.style.color = G.dbxUser ? '#C9A84C' : 'rgba(255,255,255,0.4)';
  }
}

function toast(msg, dur) {
  if (dur === undefined) dur = 2500;
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');}, dur);
}

function chips(id, active, fn) {
  var el=document.getElementById(id); if(!el) return;
  el.innerHTML=CATS.map(function(c){
    return '<button class="chip' + (active===c.id?' active':'') + '" onclick="' + fn + '(\'' + c.id + '\')">' + c.icon + ' ' + c.label + '</button>';
  }).join('');
}

function renderHome() {
  chips('chips-home', G.catH, 'setCH');
  var grid=document.getElementById('sugg-grid'), cnt=document.getElementById('sugg-count');
  if(!grid) return;
  var list=G.catH==='all'?SUGGS:SUGGS.filter(function(s){return s.cat===G.catH;});
  if(cnt) cnt.textContent=list.length+' thèmes';
  grid.innerHTML=list.map(function(item){
    var cat=CATS.find(function(c){return c.id===item.cat;})||CATS[1];

/* ══ ÉTUDE IA (Groq, fallback Pollinations) ═════════════════════════════ */
function study(id){var item=SUGGS.find(function(s){return s.id===id;});if(!item)return;runStudy({id:Date.now(),titre:item.titre,categorie:item.cat,verset:item.v,date:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}),resume:null,points:null,questions:null,ressource:null});}
function studyCustom(q){runStudy({id:Date.now(),titre:q,categorie:'foi',verset:'',date:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}),resume:null,points:null,questions:null,ressource:null});}

async function callGroq(model, prompt) {
  var r = await withTimeout(fetch('https://api.groq.com/openai/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+G.groqKey},
    body:JSON.stringify({model:model,messages:[{role:'user',content:prompt}],temperature:0.5,max_tokens:1200})
  }), 15000);
  if(!r.ok) throw new Error('HTTP '+r.status);
  var data = await r.json();
  var txt = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
  if(!txt) throw new Error('Réponse Groq vide');
  return txt;
}

async function callPollinations(prompt) {
  var r = await withTimeout(fetch('https://text.pollinations.ai/' + encodeURIComponent(prompt)), 20000);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.text();
}

async function generateStudyText(prompt) {
  if (G.groqKey) {
    for (var i=0; i<GROQ_MODELS.length; i++) {
      try { return await callGroq(GROQ_MODELS[i], prompt); } catch(e) { /* essai du modèle suivant */ }
    }
  }
  return await callPollinations(prompt);
}

async function runStudy(entry) {
  G.history=[entry].concat(G.history.filter(function(h){return h.titre!==entry.titre;})).slice(0,100);
  saveH(); G.cur=entry;
  document.getElementById('det-back').onclick=function(){show('s-history');};
  document.getElementById('det-title').textContent='Étude Biblique';
  renderDet(entry,null); show('s-detail');
  try {
    var prompt = 'Assistant étude biblique TJ basé sur wol.jw.org. TJ: Jéhovah (Ps 83:18), Jésus=Fils non égal à Dieu, morts=inconscients (Eccl 9:5), paradis terrestre, pas Trinité.\n'
      + 'Sujet: "' + entry.titre + '"'
      + (entry.verset ? '\nVerset: ' + entry.verset : '')
      + '\nRéponds uniquement avec ce JSON, sans texte autour : {"resume":"2-3 phrases TJ","points":[{"titre":"","texte":"","reference":""},{"titre":"","texte":"","reference":""},{"titre":"","texte":"","reference":""}],"questions":["",""],"ressource":"publication wol.jw.org"}';
    var txt = await generateStudyText(prompt);
    var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    Object.assign(entry,parsed);
    G.history=[entry].concat(G.history.filter(function(h){return h.titre!==entry.titre;})).slice(0,100);
    saveH();
    // Sync automatique après chaque étude
    autoSync(true);
    if(G.cur&&G.cur.id===entry.id) renderDet(entry,entry);
  } catch(e) {
    if(G.cur&&G.cur.id===entry.id) renderDet(entry,{error:true});
  }
  updateUI();
}

/* ══ IMPORT .jwlibrary ═══════════════════════════════════════════════════ */
async function importJWL(e) {
  var file=e.target.files[0]; if(!file) return;
  e.target.value='';
  var statusEl=document.getElementById('jwl-status');
  var setS=function(msg){if(statusEl)statusEl.textContent=msg;};
  setS('Lecture en cours…');
  try {
    if(!window.JSZip) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    if(!window.initSqlJs) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js');
    var buf=await file.arrayBuffer();
    setS('Décompression…');
    var zip=await window.JSZip.loadAsync(buf);
    var dbFile=zip.file('userData.db'); if(!dbFile) throw new Error('userData.db introuvable');
    var dbBuf=await dbFile.async('arraybuffer');
    setS('Extraction des notes…');
    var SQL=await window.initSqlJs({locateFile:function(f){return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f;}});
    var db=new SQL.Database(new Uint8Array(dbBuf));
    var res=db.exec('SELECT n.NoteId,n.Title,n.Content,n.LastModified,GROUP_CONCAT(t.Name,\'||\') as tags FROM Note n LEFT JOIN TagMap tm ON tm.NoteId=n.NoteId LEFT JOIN Tag t ON t.TagId=tm.TagId GROUP BY n.NoteId ORDER BY n.LastModified DESC');
    db.close();
    if(!res.length) throw new Error('Aucune note trouvée');
    var cols=res[0].columns, rows=res[0].values;
    G.jwNotes=rows.map(function(row){
      var o={};cols.forEach(function(c,i){o[c]=row[i];});
      var tags=(o.tags||'').split('||').map(function(t){return t.trim();}).filter(function(t){return t&&t!=='null';});
      return {id:String(o.NoteId),titre:(o.Title||'').replace(/ /g,' ').trim(),content:(o.Content||'').trim(),tags:tags,date:(o.LastModified||'').slice(0,10)};
    }).filter(function(n){return n.titre;});
    saveN(); buildJWTags();
    var t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    G.lastJWL=t; localStorage.setItem(SK+'j',t);
    updateUI(); renderSync();
    toast('✓ '+G.jwNotes.length+' notes JW Library importées');
  } catch(err) {
    setS('Erreur : '+err.message);
    toast('Erreur : '+err.message, 4000);
  }
}

function loadScript(src){
  return new Promise(function(resolve, reject){
    if(document.querySelector('script[src="'+src+'"]'))return resolve();
    var s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

/* ══ RENDU SYNC ══════════════════════════════════════════════════════════ */
async function connectDropbox() {
  var inp=document.getElementById('dbx-token-input');
  var tok=((inp&&inp.value)||'').trim(); if(!tok){toast('Collez votre token Dropbox');return;}
  var btn=document.getElementById('dbx-connect-btn');
  if(btn){btn.textContent='Vérification…';btn.disabled=true;}
  try {
    var user=await dbxWho(tok);
    G.dbxToken=tok; G.dbxUser=user;
    localStorage.setItem(SK+'t',tok);
    localStorage.setItem(SK+'u',JSON.stringify(user));
    updateUI(); renderSync();
    toast('✓ Dropbox connecté — Sync en cours…');
    await autoSync(false);
    renderSync();
  } catch(e) {
    toast('Token invalide. Vérifiez et réessayez.', 4000);
    if(btn){btn.textContent='Connecter Dropbox';btn.disabled=false;}
  }
}

function disconnectDropbox() {
  G.dbxToken=''; G.dbxUser=null; G.lastSync='';
  ['t','u','s'].forEach(function(k){localStorage.removeItem(SK+k);});
  updateUI(); renderSync();
}

function saveGroqKey() {
  var inp=document.getElementById('groq-key-input');
  var key=((inp&&inp.value)||'').trim();
  G.groqKey=key;
  try {
    if(key) localStorage.setItem(SK+'gk',key);
    else localStorage.removeItem(SK+'gk');
  } catch(e) {}
  toast(key?'✓ Clé Groq enregistrée':'Clé Groq retirée');
  renderSync();
}
